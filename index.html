<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Watch</title>
  <!--Link custom css file-->
  <link rel="stylesheet" href="./src/style.css" type="text/css">
  <!-- Font awesome icons link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <header class="bg-slate-950 text-3xl font-bold text-center opacity-100 p-3 text-white">Sky Watch</header>
  <!-- Background sky watch video as per weather condition-->
  <article>
    <figure>
      <video muted loop playinline autoplay class="w-full h-full fixed top-0 left-0 object-cover opacity-50">
        <source src="./assets/skybg.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </figure>
  </article>
  <!--Weather forecast section-->
  <section>
    <div
      class="weathercard flex flex-col md:flex-row justify-around absolute top-16 left-1/12 border border-solid rounded-2xl w-10/12 h-10/12 bg-gray-900">
      <!--  -->
      <div class="flex flex-col w-full md:w-1/2 h-full md:m-4">
        <!--Search location input field-->
        <div class="relative w-full mt-2 mb-2 p-5">
          <span class="absolute top-8 right-10"><i class="fa-solid fa-location-dot"></i></span>
          <input type="text" id="searchLocation" placeholder="Search for a location..." value=""
            class="w-full border border-solid rounded-xl text-white font-semibold opacity-100 mt-2 p-2 bg-gray-500 focus:outline-blue-400 ">
          <!-- Search results dropdown -->
          <ul
            class="searchList locationList absolute top-18 border list-none h-100 overflow-auto w-100 rounded-2xl bg-white z-100 hidden">
            <!-- Search results will be dynamically added here -->
          </ul>

        </div>
        <button id="currentLocationBtn" onclick="getLocation()"
          class="border w-3/4 self-center bg-blue-950 text-white rounded-xl p-2 opacity-100 hover:bg-gray-700 focus:outline-none">
          <i class="fa-solid fa-location-crosshairs"></i> Current Location
        </button>
        <!-- Current weather display -->
        <div class="flex flex-col rounded-2xl mt-2 mb-4 p-1 bg-gray-500 w-full h-full">
          <div class="currentWeather relative h-1/2 border-none rounded-2xl w-full bg-gray-500">
            <h1 class="text-3xl text-opacity-100 font-bold text-white absolute top-1/2 left-10% transform -translate-x-1/2 z-10"></h1>
          </div>
          <div class="flex gap-2 h-1/2 m-1">
            <div class="conditions border border-solid rounded-2xl w-1/2 h-full bg-gray-700"></div>
            <div class="conditions border border-solid rounded-2xl w-1/2 h-full bg-gray-700"></div>
          </div>
        </div>
      </div>
      <!-- 5-day forecast and other sections-->
      <div class="flex flex-col md:flex-row w-full md:w-1/2 md:m-4 h-full">
        <!-- 5-day forecast section -->
        <div class="flex border border-solid rounded-2xl opacity-20 mt-6 mb-4 p-1 bg-gray-500 w-full h-11/12">

        </div>

      </div>
    </div>
  </section>
  <!-- Link JS file -->
  <script src="./src/main.js"></script>
</body>

</html>

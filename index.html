<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Watch</title>
  <!--Link custom css file-->
  <link rel="stylesheet" href="./src/style.css" type="text/css">
  <!-- Font awesome icons link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <header class="bg-slate-950 text-3xl font-bold text-center opacity-100 p-3 text-white">Sky Watch</header>
  <!-- Background sky watch video as per weather condition-->
  <article>
    <figure>
      <video muted loop playinline autoplay class="w-full h-full fixed top-0 left-0 object-cover opacity-50">
        <source src="./assets/skybg.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </figure>
  </article>
  <!--Weather forecast section-->
  <section>
    <div
      class="weathercard flex flex-col justify-around absolute top-16 left-1/12 border border-solid rounded-2xl w-10/12 h-auto bg-gray-900">
      <!--  -->
      <div class="flex flex-col justify-center items-center w-full h-full">
        <!--Search location input field-->
        <div class="relative w-10/12 mt-2 mb-2 p-5">
          <!-- Search results dropdown -->
          <span class="dropdown-menu hidden absolute top-7 right-20 text-2xl"><i
              class="fa-solid fa-caret-down"></i></span>
          <input type="text" id="searchLocation" placeholder="Search for a location..." value=""
            class="w-full border border-solid rounded-xl text-white font-semibold opacity-100 mt-2 p-2 bg-gray-500 focus:outline-blue-400 ">

          <!-- search icon button -->
          <button id="searchBtn" onclick="fetchLocationSuggestions(searchInput.value)"
            class="absolute top-7.5 right-5 bg-blue-950 text-white rounded-xl p-2 opacity-100 hover:bg-gray-700 focus:outline-none">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
          <!-- Search locations display-->
          <ul
            class="searchList locationList absolute top-18 border list-none h-100 overflow-auto w-full rounded-2xl bg-white z-100 hidden">
            <!-- Search results will be dynamically added here -->
          </ul>

        </div>
        <!-- Current location buttto and metric toggle button -->
        <div class="flex items-center justify-between gap-4">
          <button id="currentLocationBtn" onclick="getLocation()"
            class="border w-full self-center bg-blue-950 text-white rounded-xl p-2 opacity-100  focus:outline-none">
            <i class="fa-solid fa-location-crosshairs"></i> Current Location
          </button>
          <label for="toggle" class="flex ml-5 items-center self-cursor-pointer">
            <!-- Label text -->
            <span id="toggle-label"
              class="mr-3 text-xl font-bolds font-medium text-gray-900 dark:text-gray-300"><sup>o</sup>C</span>
            <!-- Hidden input checkbox -->
            <input type="checkbox" id="toggle" class="sr-only peer" onchange="toggleMetric()">
            <!-- Track (the background) -->
            <div
              class="relative w-11 h-6 bg-gray-300 rounded-full peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 dark:peer-focus:ring-blue-800 dark:bg-gray-400 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:border-gray-300 after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600">
            </div>
            <!-- Label text -->
            <span id="toggle-label"
              class="ml-3 text-xl font-bolds font-medium text-gray-900 dark:text-gray-300"><sup>o</sup>F</span>
          </label>
        </div>


        <!-- Current weather display -->
        <div class="flex flex-col rounded-2xl mt-2 mb-4 p-1 bg-gray-500 w-10/12 h-full">
          <div
            class="currentWeather flex flex-col gap-2 justify-center items-center relative h-full border-none rounded-2xl w-full bg-gray-500">
            <!-- Location -->
            <span class="weatherLocation self-start ml-4 mt-1 text-xl font-bold text-white"></span>
            <!-- Date -->
            <span class="weatherDate self-start ml-4 text-sm font-semibold text-white"></span>
            <!-- Temp -->
            <span class="weatherTemp text-xl md:text-3xl font-bold text-white"></span>
            <!-- Condition -->
            <span class="weatherCondition text-xl font-semibold"></span>
            <!-- weather icon -->
            <span class="weatherIcon"></span>
          </div>
          <!-- Other weather feilds like wind, humidity -->
          <div class="flex w-full h-full gap-1">
            <div class="weatherDetails rounded-2xl h-full w-full bg-gray-700">
              <div
                class="flex flex-col md:flex-row gap-2 p-2 justify-around  items-center relative h-full border-none rounded-2xl w-full bg-gray-700">
                <span class="text-sm font-semibold text-white"><i class="fas fa-thermometer-half"></i> FEELS LIKE: <span
                    class="weatherFeelsLike text-lg font-semibold text-white"></span></span>

                <span class="text-sm font-semibold text-white"><i class="fas fa-tint"></i> HUMIDITY: <span
                    class="weatherHumidity text-lg font-semibold text-white"></span></span>

                <span class="text-sm font-semibold text-white"><i class="fas fa-wind"></i> WIND SPEED: <span
                    class="weatherWindSpeed text-lg font-semibold text-white"></span></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- 5-day forecast and other sections-->
      <div class="flex self-center flex-col md:flex-col w-10/12 h-full">
        <!-- 5-day forecast section -->
        <div class="flex flex-col gap-4 rounded-2xl mt-6 mb-4 p-4 bg-gray-500 w-full h-full">
          <span class="text-lg font-bold text-white m-2"><i class="fa-solid fa-calendar-days"></i> 5-DAY FORECAST</span>
          <div
            class="flex gap-3 justify-around items-center w-full h-full relative rounded-2xl bg-gray-700 overflow-x-auto pb-2">

            <div
              class="forecastContainer flex gap-3 justify-around items-center w-full h-full relative rounded-2xl bg-gray-700">
              <!-- Forecast cards will be dynamically added here -->
            </div>
          </div>

        </div>

      </div>
    </div>
  </section>
  <!-- Link JS file -->
  <script src="./src/main.js"></script>
</body>

</html>
